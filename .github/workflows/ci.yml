name: CI
on: [push, pull_request]
jobs:
  build:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4
      - name: Setup Node.js 🟢
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies 📦
        run: yarn install
      - name: Build 🔧
        run: yarn build
      - name: Lint 🔍
        run: yarn lint
      - name: Test 🧪
        run: yarn test

  validate-icons:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4
      - name: Setup Node.js 🟢
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Setup Java ☕
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin
      - name: Cache HeadlessMC files 💾
        uses: actions/cache@v4
        with:
          path: headlessmc
          key: headlessmc-${{ hashFiles('test/resources/modpack-minecraft.json') }}
          restore-keys: |
            headlessmc-
      - name: Install dependencies and build 🔧
        run: |
          yarn install
          yarn build
      - name: Install Xvfb 🖥️
        run: sudo apt-get install -y xvfb
      - name: Generate icons 🎨
        run: xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" node bin/generate-icons.js test/resources/modpack-minecraft.json --icons-dir output/assets/icon
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Compress icons 🗜️
        run: node bin/compress-icons.js output
